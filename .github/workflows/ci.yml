name: OMEGA CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install numpy scipy aiohttp
      - run: python -c "import main_unleashed; print('OMEGA import OK')"
